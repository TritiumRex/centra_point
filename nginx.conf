user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Resolver for dynamic proxy_pass with variables
    resolver 192.168.1.12 valid=30s ipv6=off;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # Main centra_point server on port 80
    server {
        listen 80;
        server_name _;

        # API routes
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django admin panel
        location /django-admin/ {
            rewrite ^/django-admin/(.*) /admin/$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static files from Django
        location /static/ {
            alias /app/staticfiles/;
        }

        location /media/ {
            alias /app/media/;
        }

        # React frontend (catch-all)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            error_page 404 =200 /index.html;
        }
    }

    # Proxmox proxy on port 9006 — root path, no rewriting needed
    server {
        listen 9006;
        server_name _;

        location / {
            proxy_pass https://192.168.1.5:8006/;
            proxy_ssl_verify off;
            proxy_set_header Host 192.168.1.5:8006;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_redirect https://192.168.1.5:8006/ /;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }

    # Mailcow proxy on port 9025 — root path, strips iframe headers
    server {
        listen 9025;
        server_name _;

        location / {
            proxy_pass https://192.168.1.25/;
            proxy_ssl_verify off;
            proxy_set_header Host mail.tibernium.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_redirect https://mail.tibernium.com/ /;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }

    # Service proxy on port 8888 — strips X-Frame-Options so iframes work
    server {
        listen 8888;
        server_name _;

        # Generic HTTP proxy for everything else
        location ~ ^/(?<target_host>[^/]+)/(?<target_path>.*)$ {
            proxy_pass http://$target_host/$target_path$is_args$args;
            proxy_set_header Host $target_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect ~^http://([^/]+)/(.*) http://$host:8888/$1/$2;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            sub_filter_once off;
            sub_filter_types text/html application/javascript text/css;
            sub_filter 'href="/' 'href="/$target_host/';
            sub_filter 'src="/' 'src="/$target_host/';
            sub_filter 'action="/' 'action="/$target_host/';

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_cookie_path / /$target_host/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
